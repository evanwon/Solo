name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy theme
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - run: pnpm install --no-frozen-lockfile

      # Stamp a unique, traceable version into the deployed theme so Ghost Admin
      # shows which build is live. Format: <upstream major.minor>.<UTC YYYYMMDD>+<short sha>
      # e.g. 1.0.20260623+a1b2c3d. CI-only — package.json is NOT committed with this,
      # so it stays aligned with upstream (no merge conflicts on the version field).
      - name: Stamp theme version
        run: |
          BASE=$(node -p "require('./package.json').version.split('+')[0].split('-')[0].split('.').slice(0,2).join('.')")
          export VERSION="${BASE}.$(date -u +%Y%m%d)+$(git rev-parse --short HEAD)"
          node -e 'const fs=require("fs");const p=require("./package.json");p.version=process.env.VERSION;fs.writeFileSync("package.json",JSON.stringify(p,null,2)+"\n");'
          echo "Stamped theme version: $VERSION"

      # Fail the deploy if the theme doesn't pass validation (also validates the stamped semver).
      - run: pnpm exec gscan --fatal --verbose .

      # The deploy action zips the working tree but does NOT build, so build first.
      - run: pnpm exec gulp build

      # Ghost's file-permission check only accepts 644/664. Strip stray executable
      # bits before zipping — some committed images carry them, and gulp re-applies
      # one to assets/built/main.min.js during the build above.
      - name: Normalize file permissions
        run: find . -type f -not -path './.git/*' -not -path './node_modules/*' -exec chmod 644 {} +

      # Packages the working directory (not a prebuilt file: zip — theme-name is
      # ignored with file:) and uploads + activates via the Ghost Admin API.
      - name: Deploy to Ghost
        uses: TryGhost/action-deploy-theme@57d2c493d3fc90d624bb9b906d29066c61bbbfe1 # v2
        with:
          api-url: ${{ secrets.GHOST_ADMIN_API_URL }}
          api-key: ${{ secrets.GHOST_ADMIN_API_KEY }}
          theme-name: solo-evanw
          exclude: |
            AGENTS.md
            CLAUDE.md
            dist
